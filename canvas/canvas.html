<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>canvas live viewer</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #202020;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    background: #ffffff;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    display: block;
  }
  #filter {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 10;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    color: #f0f0f0;
  }
  #filter-toggle {
    background: rgba(32, 32, 32, 0.85);
    color: #f0f0f0;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
    font: inherit;
  }
  #filter-toggle:hover {
    background: rgba(64, 64, 64, 0.85);
  }
  #filter-list {
    display: none;
    margin-top: 4px;
    background: rgba(32, 32, 32, 0.92);
    border: 1px solid #555;
    border-radius: 4px;
    max-height: 60vh;
    overflow-y: auto;
    min-width: 180px;
  }
  #filter.open #filter-list {
    display: block;
  }
  #filter-list .empty {
    padding: 8px 10px;
    color: #888;
    font-style: italic;
  }
  #filter-list label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    cursor: pointer;
  }
  #filter-list label:hover {
    background: rgba(64, 64, 64, 0.85);
  }
  #filter-list input {
    margin: 0;
  }
</style>
</head>
<body>
<canvas id="canvas" width="0" height="0"></canvas>
<div id="filter">
  <button id="filter-toggle" type="button">Artists</button>
  <div id="filter-list"></div>
</div>
<script>
(() => {
  "use strict";

  const SERVER_HTTP = "http://195.133.25.57";
  const SERVER_WS   = "ws://195.133.25.57/canvas/ws";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  // Буфер штрихов текущего кадра. Очищается каждый тик renderer-а.
  let frameBuffer = [];

  // artistFilter — Map<artist_name, enabled:bool>. Новый артист появляется
  // с enabled=true. Меняется из dropdown и через reset() на clear.
  const artistFilter = (() => {
    const state = new Map();
    const listeners = new Set();
    const emit = () => { for (const fn of listeners) fn(); };
    return {
      observe(name) {
        if (typeof name !== "string" || state.has(name)) return;
        state.set(name, true);
        emit();
      },
      isEnabled(name) {
        // Штрихи без известного artist_name отображаем по умолчанию —
        // фильтр работает только по тому, что увидели через observe.
        const v = state.get(name);
        return v === undefined ? true : v;
      },
      toggle(name) {
        if (!state.has(name)) return;
        state.set(name, !state.get(name));
        emit();
      },
      entries() {
        return Array.from(state.entries());
      },
      reset() {
        if (state.size === 0) return;
        state.clear();
        emit();
      },
      subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
    };
  })();

  // dropdown — UI поверх artistFilter. Кнопка-триггер открывает/закрывает
  // список чекбоксов; список перерисовывается при каждом изменении фильтра.
  const dropdown = (() => {
    const root = document.getElementById("filter");
    const toggle = document.getElementById("filter-toggle");
    const list = document.getElementById("filter-list");

    toggle.addEventListener("click", () => {
      root.classList.toggle("open");
    });

    function render() {
      const entries = artistFilter.entries();
      list.replaceChildren();
      if (entries.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "no artists yet";
        list.appendChild(empty);
        return;
      }
      for (const [name, enabled] of entries) {
        const label = document.createElement("label");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = enabled;
        cb.dataset.artist = name;
        cb.addEventListener("change", () => artistFilter.toggle(name));
        const text = document.createElement("span");
        text.textContent = name;
        label.appendChild(cb);
        label.appendChild(text);
        list.appendChild(label);
      }
    }

    artistFilter.subscribe(render);
    render();
    return { render };
  })();

  function drawStroke(s) {
    ctx.strokeStyle = s.color;
    ctx.lineWidth = s.w;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.beginPath();
    ctx.moveTo(s.x1, s.y1);
    ctx.lineTo(s.x2, s.y2);
    ctx.stroke();
  }

  // 30fps render loop. Каждый кадр: clear → отрисовать буфер → очистить буфер.
  // Так каждый штрих живёт ровно один кадр.
  const FRAME_MS = 1000 / 30;
  let lastFrame = 0;

  function tick(now) {
    requestAnimationFrame(tick);
    if (now - lastFrame < FRAME_MS) return;
    lastFrame = now;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of frameBuffer) {
      if (!artistFilter.isEnabled(s.artist_name)) continue;
      drawStroke(s);
    }
    frameBuffer = [];
  }
  requestAnimationFrame(tick);

  function applyOpen(msg) {
    const c = msg.canvas;
    if (!c || typeof c.width !== "number" || typeof c.height !== "number") return;
    canvas.width = c.width;
    canvas.height = c.height;
  }

  function applyStrokes(strokes) {
    if (!Array.isArray(strokes)) return;
    for (const s of strokes) {
      if (s && typeof s.artist_name === "string") {
        artistFilter.observe(s.artist_name);
      }
      frameBuffer.push(s);
    }
  }

  const ws = new WebSocket(SERVER_WS);
  ws.addEventListener("message", (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (!msg || typeof msg.type !== "string") return;
    switch (msg.type) {
      case "open":     applyOpen(msg); break;
      case "snapshot": applyStrokes(msg.strokes); break;
      case "delta":    applyStrokes(msg.strokes); break;
      // clear и неизвестные типы здесь игнорируются — обработка clear
      // приходит в issue 003.
      default: break;
    }
  });
  // На close / error — ничего: вьюер замирает, артист обновит F5 (см. PRD).

  // Экспонируем константы и хуки для тестов (не для UI).
  window.__viewer = { SERVER_HTTP, SERVER_WS, ws, canvas, artistFilter, dropdown };
})();
</script>
</body>
</html>
